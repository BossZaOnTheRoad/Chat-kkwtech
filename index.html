<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat kkwtech</title>

  <link rel="icon" href="favicon.ico">

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      overflow: hidden;

      /* 🔥 พื้นหลังมืด + แสงสะท้อนสีโรงเรียน */
      background: #0f172a;
    }

    /* 🔥 แสงสะท้อน */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 30% 20%, rgba(127,22,28,0.4), transparent 40%),
        radial-gradient(circle at 70% 80%, rgba(52,77,150,0.4), transparent 40%);
      z-index: 0;
    }

    h2 {
      margin-top: 20px;
      color: white;
      position: relative;
      z-index: 1;
    }

    .chat-container {
      position: relative;
      max-width: 900px;
      margin: auto;
      padding: 10px;
      z-index: 1;
    }

    #quickchat-embedded {
      width: 100%;
      height: 80vh;
      border-radius: 16px;
      overflow: hidden;

      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);

      box-shadow: 0 10px 40px rgba(0,0,0,0.5);

      opacity: 0;
      transform: translateY(30px);
      transition: all 0.6s ease;
      display: none;
    }

    #quickchat-embedded.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* 🔥 หน้าโหลดเต็มจอ */
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      color: white;
    }

    /* 🔄 spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* typing overlay */
    #typingOverlay {
      position: absolute;
      bottom: 25px;
      left: 25px;
      background: #ffffff;
      color: #000;

      padding: 10px 14px;
      border-radius: 12px;

      box-shadow: 0 2px 12px rgba(0,0,0,0.2);

      font-size: 14px;
      display: none;
      max-width: 70%;
      text-align: left;
    }

    .cursor {
      display: inline-block;
      width: 5px;
      background: black;
      margin-left: 2px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 0; }
      50% { opacity: 1; }
    }

  </style>
</head>

<body>

<!-- 🔥 หน้าโหลด -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <div>กำลังโหลด...อยู่ใจเย็นๆ</div>
</div>

<h2>💬 AI ผู้ช่วยตอบคำถามวิทยาลัยวังไกลกังวล ๒</h2>

<div class="chat-container">

  <div id="quickchat-embedded"></div>

  <div id="typingOverlay">
    <span id="typingText"></span><span class="cursor"></span>
  </div>

</div>

<script>

// 🔥 ดีเลย์ก่อนเข้าเว็บ (จำลองโหลดหนัก)
setTimeout(() => {
  document.getElementById("loadingScreen").style.display = "none";
}, 1800);


// โหลด quickchat
(function(e,a,d,i,c,t=a.createElement(d)){
  e[c]=e[c]||function(){(e[c].q=e[c].q||[]).push(arguments)};
  t.src=i;
  t.async=1;

  t.onload = function() {

    const chat = document.getElementById("quickchat-embedded");
    chat.style.display = "block";

    setTimeout(() => {
      chat.classList.add("show");
    }, 200);

    fakeTyping("AI พร้อมให้บริการแล้ว");
  };

  a.body.appendChild(t);
})(window,document,"script","https://bubble.quickchat.ai/chat.js","_quickchat");

_quickchat("containerId", "quickchat-embedded");
_quickchat("init", "9w0hr7fcp5");


function fakeTyping(text) {
  const overlay = document.getElementById("typingOverlay");
  const textEl = document.getElementById("typingText");

  overlay.style.display = "block";
  textEl.innerHTML = "";

  let i = 0;

  const interval = setInterval(() => {
    textEl.innerHTML = text.substring(0, i);
    i++;

    if (i > text.length) {
      clearInterval(interval);

      setTimeout(() => {
        overlay.style.display = "none";
      }, 1200);
    }
  }, 25);
}

</script>

</body>
</html>
