<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat kkwtech</title>

  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link rel="shortcut icon" href="/favicon.ico?v=2">

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      overflow: hidden;
      background: #0f172a;
    }

    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 30% 20%, rgba(127,22,28,0.4), transparent 40%),
        radial-gradient(circle at 70% 80%, rgba(52,77,150,0.4), transparent 40%);
      z-index: 0;
    }

    h2 {
      margin-top: 20px;
      color: white;
      position: relative;
      z-index: 1;
    }

    .chat-container {
      position: relative;
      max-width: 900px;
      margin: auto;
      padding: 10px;
      z-index: 1;
    }

    #quickchat-embedded {
      width: 100%;
      height: 80vh;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.6s ease;
      display: none;
    }

    #quickchat-embedded.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* loading */
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      color: white;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* typing */
    #typingOverlay {
      position: absolute;
      bottom: 25px;
      left: 25px;
      background: #ffffff;
      color: #000;
      padding: 10px 14px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      font-size: 14px;
      display: none;
      max-width: 70%;
      text-align: left;
    }

    .cursor {
      display: inline-block;
      width: 5px;
      background: black;
      margin-left: 2px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 0; }
      50% { opacity: 1; }
    }

    /* 🔥 footer fade-in */
    #footerNote {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);

      font-size: 12px;
      color: rgba(255,255,255,0.6);

      background: rgba(0,0,0,0.4);
      padding: 6px 14px;
      border-radius: 999px;

      backdrop-filter: blur(6px);
      z-index: 999;

      opacity: 0;
      animation: slideFade 0.8s ease forwards;
      animation-delay: 2.2s;
    }

    @keyframes slideFade {
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

  </style>
</head>

<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <div>กำลังโหลด...อยู่ใจเย็นๆ</div>
</div>

<h2>💬 AI ผู้ช่วยตอบคำถามวิทยาลัยวังไกลกังวล ๒</h2>

<div class="chat-container">

  <div id="quickchat-embedded"></div>

  <div id="typingOverlay">
    <span id="typingText"></span><span class="cursor"></span>
  </div>

</div>

<!-- 🔥 footer -->
<div id="footerNote">
  ⚠️ AI อาจมีข้อผิดพลาด ผมมันชอบตอบหลอนๆ อย่างกะดูดม้ามา 20 หลุม
</div>

<script>

setTimeout(() => {
  document.getElementById("loadingScreen").style.display = "none";
}, 1800);

(function(e,a,d,i,c,t=a.createElement(d)){
  e[c]=e[c]||function(){(e[c].q=e[c].q||[]).push(arguments)};
  t.src=i;
  t.async=1;

  t.onload = function() {
    const chat = document.getElementById("quickchat-embedded");
    chat.style.display = "block";

    setTimeout(() => {
      chat.classList.add("show");
    }, 200);

    fakeTyping("AI พร้อมให้บริการแล้ว");
  };

  a.body.appendChild(t);
})(window,document,"script","https://bubble.quickchat.ai/chat.js","_quickchat");

_quickchat("containerId", "quickchat-embedded");
_quickchat("init", "9w0hr7fcp5");

function fakeTyping(text) {
  const overlay = document.getElementById("typingOverlay");
  const textEl = document.getElementById("typingText");

  overlay.style.display = "block";
  textEl.innerHTML = "";

  let i = 0;

  const interval = setInterval(() => {
    textEl.innerHTML = text.substring(0, i);
    i++;

    if (i > text.length) {
      clearInterval(interval);

      setTimeout(() => {
        overlay.style.display = "none";
      }, 1200);
    }
  }, 25);
}

</script>

</body>
</html>
