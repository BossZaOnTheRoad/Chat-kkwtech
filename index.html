<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat kkwtech</title>

<link rel="icon" href="/favicon.ico?v=2">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 30% 20%, rgba(127,22,28,0.4), transparent 40%),
    radial-gradient(circle at 70% 80%, rgba(52,77,150,0.4), transparent 40%);
}

h2 {
  color: white;
  margin: 15px;
}

.chat-container {
  max-width: 900px;
  margin: auto;
  padding: 10px;
}

#quickchat-embedded {
  width: 100%;
  height: 80vh;
  border-radius: 16px;
  background: white;
  display: none;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.5s;
}

#quickchat-embedded.show {
  opacity: 1;
  transform: translateY(0);
}

/* 🔘 ปุ่ม */
#infoBtn, #mailBtn {
  position: fixed;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1000;
}

/* info */
#infoBtn {
  top: 15px;
  right: 15px;
  width: 35px;
  height: 35px;
}

/* mail */
#mailBtn {
  left: 15px;
  top: 120px;
  width: 45px;
  height: 45px;
  transition: 0.3s;
}

#mailBtn.move {
  left: 270px;
}

/* sidebar */
#sidebar {
  position: fixed;
  left: -260px;
  width: 240px;
  height: 100%;
  background: white;
  padding: 12px;
  transition: 0.3s;
}

#sidebar.open {
  left: 0;
}

.tip {
  background: #eee;
  padding: 8px;
  margin: 6px 0;
  border-radius: 8px;
  font-size: 13px;
}

/* modal */
#updateModal {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modalBox {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 300px;
  line-height: 1.6;
}

/* 📱 Mobile */
@media (max-width: 599px) {

  #quickchat-embedded {
    height: 100vh;
    border-radius: 0;
  }

  #mailBtn {
    top: 90px;
    width: 40px;
    height: 40px;
  }

  #mailBtn.move {
    left: 220px;
  }

  #sidebar {
    width: 200px;
  }

}

/* 📱 Tablet */
@media (min-width: 600px) and (max-width: 1023px) {

  .chat-container {
    max-width: 700px;
  }

  #quickchat-embedded {
    height: 85vh;
  }

  #mailBtn.move {
    left: 250px;
  }

  #sidebar {
    width: 220px;
  }

}

</style>
</head>

<body>

<h2>💬 AI ผู้ช่วยตอบคำถามวิทยาลัย</h2>

<div id="infoBtn">i</div>
<div id="mailBtn">📬</div>

<div id="sidebar">
  <h3>💡 ความสามารถ</h3>

  <div class="tip">💰 บอกงบประมาณ</div>
  <div class="tip">📊 ตรวจสอบค่าใช้จ่าย</div>
  <div class="tip">👤 ข้อมูลบุคลากร</div>

  <hr>

  <small>
    เช่น:<br>
    - งบแผนก<br>
    - รายชื่อครู
  </small>
</div>

<div id="updateModal">
  <div class="modalBox">
    <h3>📢 อัปเดตระบบ</h3>

    <b>1.2</b><br>
    - พัฒนาระบบ Data<br>
    - แก้แชท AI ข้อมูลไม่ได้<br>
    - ปรับระบบแชท<br><br>

    <b>1.1</b><br>
    - พัฒนาข้อมูล AI<br>
    - เปิดระบบอัปเดต<br><br>

    <b>1.0</b><br>
    - เปิดเว็บ<br>
    - ปรับโมเดล

    <br><br>
    <button onclick="closeModal()">ปิด</button>
  </div>
</div>

<div class="chat-container">
  <div id="quickchat-embedded"></div>
</div>

<script>

/* quickchat */
(function(e,a,d,i,c,t=a.createElement(d)){
  e[c]=e[c]||function(){(e[c].q=e[c].q||[]).push(arguments)};
  t.src=i;
  t.async=1;

  t.onload = function() {
    const chat = document.getElementById("quickchat-embedded");
    chat.style.display = "block";
    setTimeout(() => chat.classList.add("show"), 200);
  };

  a.body.appendChild(t);
})(window,document,"script","https://bubble.quickchat.ai/chat.js","_quickchat");

_quickchat("containerId", "quickchat-embedded");
_quickchat("init", "9w0hr7fcp5");

/* modal */
const infoBtn = document.getElementById("infoBtn");
const modal = document.getElementById("updateModal");

infoBtn.onclick = () => modal.style.display = "flex";
function closeModal() { modal.style.display = "none"; }

/* sidebar */
const mailBtn = document.getElementById("mailBtn");
const sidebar = document.getElementById("sidebar");

mailBtn.onclick = () => {
  sidebar.classList.toggle("open");
  mailBtn.classList.toggle("move");
};

</script>

</body>
</html>
